name: Deploy Landing to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - 'public/**'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Landing
        run: |
          cd landing
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy landing/public --project-name=mycompi-landing-new --commit-message="deploy ${{ github.sha }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_PAGES_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

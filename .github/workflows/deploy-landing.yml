name: Build & Deploy Landing to Render

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - 'public/**'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build Landing + Deploy to Render
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        working-directory: landing
        run: npm ci

      - name: Build Landing
        working-directory: landing
        run: npm run build

      - name: Deploy to Render
        run: |
          echo "📦 Desplegando a Render..."
          curl -s -X POST \
            "https://api.render.com/v1/services/srv-d6up1mvfte5s73df21k0/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'
          echo "✅ Deploy触发ado (verificar en https://dashboard.render.com)"

      - name: Purge Cloudflare Cache
        run: |
          echo "🗑️  Purgando cache de Cloudflare..."
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ vars.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything": true}' && echo "✅ Cache purgado" || echo "⚠️  Purge falló (continuando)"

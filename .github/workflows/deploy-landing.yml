name: Build & Deploy Landing to Render

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - 'public/**'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build Landing + Deploy to Render
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        working-directory: landing
        run: npm ci

      - name: Build Landing
        working-directory: landing
        run: npm run build

      - name: Deploy to Render via webhook
        run: |
          echo "📦 Desplegando a Render..."
          RESPONSE=$(curl -s -X POST \
            "https://api.render.com/v1/services/srv-d6up1mvfte5s73df21k0/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.render.blueprint+json" \
            -d '{}')

          echo "Response: $RESPONSE"
          DEPLOY_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null)
          if [ -n "$DEPLOY_ID" ]; then
            echo "✅ Deploy iniciado: $DEPLOY_ID"
          else
            echo "❌ Error en deploy: $RESPONSE"
            exit 1
          fi

      - name: Purge Cloudflare Cache
        run: |
          echo "🗑️  Purgando cache de Cloudflare..."
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ vars.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything": true}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ Cache purgado' if d.get('success') else '❌ Error: ' + str(d.get('errors')))"
        continue-on-error: true

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo Luna — Pizzería Don Carlos</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a24;
      --accent: #6c5ce7;
      --accent-light: #a29bfe;
      --text-primary: #ffffff;
      --text-secondary: #a0a0b0;
      --text-muted: #606070;
      --border: #2a2a3a;
      --success: #00b894;
      --warning: #fdcb6e;
      --error: #ff6b6b;
      --pizza-orange: #e17055;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .pizza-icon {
      font-size: 32px;
    }

    .brand h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--pizza-orange);
    }

    .brand span {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .agent-info h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .agent-info span {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--success);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
    }

    /* Info banner */
    .info-banner {
      background: linear-gradient(90deg, var(--pizza-orange), #f39c12);
      color: white;
      text-align: center;
      padding: 8px;
      font-size: 13px;
      font-weight: 500;
    }

    /* Chat container */
    .chat-container {
      flex: 1;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Messages */
    .message {
      display: flex;
      gap: 12px;
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg-card);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      border: 2px solid var(--border);
    }

    .message.luna .message-avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border: none;
    }

    .message.user .message-avatar {
      background: var(--pizza-orange);
      border: none;
    }

    .message-content {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 12px 16px;
      border: 1px solid var(--border);
    }

    .message.user .message-content {
      background: var(--pizza-orange);
      border-color: var(--pizza-orange);
    }

    .message.luna .message-content {
      border-left: 3px solid var(--accent);
    }

    .message-text {
      font-size: 14px;
      line-height: 1.6;
    }

    .message-time {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .message.user .message-time {
      color: rgba(255,255,255,0.7);
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 12px;
      max-width: 85%;
    }

    .typing-content {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 16px 20px;
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: typing 1.4s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: scale(1); opacity: 0.4; }
      30% { transform: scale(1.2); opacity: 1; }
    }

    /* Input area */
    .input-area {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 16px 24px;
    }

    .input-container {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .input-wrapper {
      flex: 1;
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: 20px;
      padding: 4px;
      display: flex;
      align-items: flex-end;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
    }

    textarea {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
      padding: 12px 16px;
    }

    textarea::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pizza-orange), #f39c12);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(225, 112, 85, 0.3);
    }

    .send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(225, 112, 85, 0.4);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .send-btn svg {
      width: 22px;
      height: 22px;
      fill: white;
      margin-left: 2px;
    }

    /* Token info bar */
    .token-bar {
      max-width: 800px;
      margin: 0 auto;
      padding: 8px 0;
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
    }

    .token-bar span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .token-bar .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .token-bar .dot.ok { background: var(--success); }
    .token-bar .dot.warning { background: var(--warning); }
    .token-bar .dot.error { background: var(--error); }

    /* Error toast */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--error);
      color: white;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(255, 107, 107, 0.4);
    }

    .toast.show {
      opacity: 1;
    }

    /* Welcome message */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      background: var(--bg-card);
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .welcome-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .welcome h2 {
      font-size: 22px;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .welcome p {
      font-size: 14px;
      color: var(--text-secondary);
      max-width: 400px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .quick-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .quick-btn {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .quick-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="info-banner">
    🍕 Demo — Pizzería Don Carlos — Powered by MyCompi
  </div>

  <header class="header">
    <div class="header-left">
      <div class="pizza-icon">🍕</div>
      <div class="brand">
        <h1>Pizzería Don Carlos</h1>
        <span>Demo Beta</span>
      </div>
    </div>
    <div style="display: flex; align-items: center; gap: 16px;">
      <div class="agent-info" style="text-align: right;">
        <h1>🌙 Luna</h1>
        <span>Tu asistente digital</span>
      </div>
      <div class="avatar">🌙</div>
    </div>
  </header>

  <div class="token-bar">
    <span><span class="dot ok" id="statusDot"></span> <span id="statusText">Conectado</span></span>
    <span id="tokenInfo">Budget: --</span>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🌙</div>
      <h2>¡Hola! Soy Luna</h2>
      <p>Estoy aquí para ayudarte con Pizzería Don Carlos. Puedo responder dudas sobre el menú, reservas, catering, y cualquier cosa que necesites.</p>
      <div class="quick-actions">
        <button class="quick-btn" onclick="sendQuick('¿Hacéis pizzas sin gluten?')">¿Pizzas sin gluten?</button>
        <button class="quick-btn" onclick="sendQuick('Quiero hacer una reserva para 8 personas')">Reserva para 8</button>
        <button class="quick-btn" onclick="sendQuick('¿Qué pizzas recommendáis?')">Recomendaciones</button>
        <button class="quick-btn" onclick="sendQuick('¿Hacéis catering para eventos?')">Catering</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-container">
      <div class="input-wrapper">
        <textarea 
          id="messageInput" 
          placeholder="Escribe tu mensaje..."
          rows="1"
        ></textarea>
      </div>
      <button class="send-btn" id="sendBtn" disabled>
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // NOTE: This is a DEMO. In production, use proper auth.
    // For demo purposes, we bypass auth by modifying the fetch to include a demo flag
    const API_URL = ''; // Mismo origen
    
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const toast = document.getElementById('toast');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const tokenInfo = document.getElementById('tokenInfo');
    const welcome = document.getElementById('welcome');

    let isLoading = false;

    messageInput.addEventListener('input', () => {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
      sendBtn.disabled = !messageInput.value.trim() || isLoading;
    });

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (messageInput.value.trim() && !isLoading) {
          sendMessage();
        }
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    function sendQuick(text) {
      messageInput.value = text;
      messageInput.dispatchEvent(new Event('input'));
      sendMessage();
    }

    async function sendMessage() {
      const mensaje = messageInput.value.trim();
      if (!mensaje || isLoading) return;

      isLoading = true;
      sendBtn.disabled = true;
      messageInput.value = '';
      messageInput.style.height = 'auto';

      addMessage(mensaje, 'user');
      if (welcome) welcome.remove();
      showTyping();

      try {
        // Demo mode: we're using a hardcoded client ID and bypassing normal auth
        const response = await fetch(`${API_URL}/api/chat`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Demo-Mode': 'true',
            'X-Client-ID': 'pizzeriacliente',
          },
          body: JSON.stringify({
            agente: 'luna',
            mensaje: mensaje,
          }),
        });

        hideTyping();

        if (response.status === 429) {
          const data = await response.json();
          showToast(data.mensaje || 'Límite alcanzado');
          return;
        }

        if (!response.ok) {
          throw new Error('Error del servidor');
        }

        const data = await response.json();
        
        if (data.metadata) {
          updateBudget(data.metadata);
        }

        addMessage(data.respuesta, 'luna');

      } catch (err) {
        hideTyping();
        console.error(err);
        showToast('No pude enviar el mensaje. Intenta de nuevo.');
      } finally {
        isLoading = false;
        sendBtn.disabled = !messageInput.value.trim();
      }
    }

    function addMessage(text, sender) {
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      
      const time = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
      
      // Simple markdown-like formatting
      let formattedText = text
        .replace(/\n/g, '<br>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      
      div.innerHTML = `
        <div class="message-avatar">${sender === 'luna' ? '🌙' : '👤'}</div>
        <div class="message-content">
          <div class="message-text">${formattedText}</div>
          <div class="message-time">${time}</div>
        </div>
      `;

      chatContainer.appendChild(div);
      scrollToBottom();
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typingIndicator';
      div.innerHTML = `
        <div class="message-avatar">🌙</div>
        <div class="typing-content">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      `;
      chatContainer.appendChild(div);
      scrollToBottom();
    }

    function hideTyping() {
      const typing = document.getElementById('typingIndicator');
      if (typing) typing.remove();
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    function updateBudget(metadata) {
      const remaining = metadata.bucketRestante || 0;
      const total = 1500;
      const pct = (remaining / total * 100).toFixed(0);
      
      tokenInfo.textContent = `Budget: ${remaining}/${total} (${pct}%)`;
      
      if (pct < 10) {
        statusDot.className = 'dot error';
        statusText.textContent = 'Budget bajo';
      } else if (pct < 30) {
        statusDot.className = 'dot warning';
        statusText.textContent = 'Budget moderado';
      } else {
        statusDot.className = 'dot ok';
        statusText.textContent = 'Conectado';
      }
    }

    function scrollToBottom() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }
  </script>
</body>
</html>

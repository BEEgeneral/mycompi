name: mycompi
env: node
region: frankfurt
buildCommand: npm install && npx prisma generate
startCommand: node src/index.js
healthCheckPath: /health
headers:
  - name: Content-Security-Policy
    value: default-src 'self'; base-uri 'self'; font-src 'self' https: data:; form-action 'self'; frame-ancestors 'self'; img-src 'self' data: https://res.cloudinary.com; object-src 'none'; script-src 'self'; script-src-attr 'none'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; upgrade-insecure-requests
envVars:
  - key: NODE_ENV
    value: production
  - key: DATABASE_URL
    sync: false
  - key: JWT_SECRET
    sync: false
  - key: JWT_REFRESH_SECRET
    sync: false
  - key: FRONTEND_URL
    value: "*"
  - key: PORT
    value: "3000"

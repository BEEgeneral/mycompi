{
  "name": "mycompi",
  "env": "node",
  "region": "frankfurt",
  "buildCommand": "npm install",
  "startCommand": "node src/index.js",
  "envVars": [
    {
      "key": "DATABASE_URL",
      "value": "",
      "description": "Neon PostgreSQL connection string"
    },
    {
      "key": "JWT_SECRET",
      "value": "",
      "description": "Secret key for JWT tokens"
    },
    {
      "key": "NODE_ENV",
      "value": "production"
    }
  ]
}

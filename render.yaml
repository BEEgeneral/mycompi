name: mycompi
env: node
region: frankfurt
buildCommand: npm install && npx prisma generate
startCommand: node src/index.js
healthCheckPath: /health
envVars:
  - key: NODE_ENV
    value: production
  - key: DATABASE_URL
    sync: false
  - key: JWT_SECRET
    sync: false
  - key: JWT_REFRESH_SECRET
    sync: false
  - key: FRONTEND_URL
    value: "*"
  - key: PORT
    value: "3000"
